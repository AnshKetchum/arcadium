parameters:
  experiment_name: "nanogpt-speedrun-ablations"
  run_name: "speedrun-gpt2-100M"
  training_steps: 50000
  epochs: 4
  val_steps: 10
  checkpoint_frequency: 1000  # keeping as requested
  batch_size: 32              # increased from 8
  num_workers: 4              # keeping as requested
  sequence_length: 1024       # increased from 32
  lr: 3e-4
  optimizer:
    name: "muon+adam"
    lr: 3e-4           # AdamW lr (biases, norms, embeddings)
    muon_lr: 0.02      # Muon lr (all 2-D weight matrices)
    weight_decay: 0.1  # AdamW decoupled weight decay
    ns_steps: 5        # Newton-Schulz iterations for orthogonalization
  training_sequence_length:
    start: 1024               # fixed length, no curriculum
    end: 1024                 # fixed length, no curriculum
    steps: 1                  # no curriculum steps
  validation_sequence_length: 1024  # increased from 256
  training_data_config: "configs/data/fineweb.yaml"
  validation_data_config: "configs/data/fineweb.yaml"
  warmup_steps: 2000          # explicit warmup
  min_lr_ratio: 0.1           # GPT-2 style decay